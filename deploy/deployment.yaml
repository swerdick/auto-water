apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-water
  namespace: auto-water
  labels:
    app: auto-water
spec:
  replicas: 1
  # One set of physical sensors on samwise — never run two pollers at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: auto-water
  template:
    metadata:
      labels:
        app: auto-water
    spec:
      # Pin to the Pi sensor host and tolerate its NoSchedule taint.
      nodeSelector:
        homelab.vingilot.internal/host: samwise
      tolerations:
        - key: homelab.vingilot.internal/role
          operator: Equal
          value: pi
          effect: NoSchedule
      # Schema is migration-owned: apply pending migrations before the poller
      # starts so `readings` exists on first write.
      initContainers:
        - name: migrate
          image: ghcr.io/swerdick/auto-water:latest
          imagePullPolicy: Always
          command: ["python", "-m", "auto_water.migrate", "up"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auto-water-db-app
                  key: uri
      containers:
        - name: poller
          image: ghcr.io/swerdick/auto-water:latest
          imagePullPolicy: Always
          # privileged + root for I²C (/dev/i2c-1) and 1-Wire (/sys/bus/w1)
          # access on the Pi. Tighten later with specific device mounts.
          securityContext:
            privileged: true
            runAsUser: 0
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            # Generous backstop — the ~30-day in-memory retry buffer is only
            # ~50-65 MB, so this rarely matters; OOM here means start fresh.
            limits:
              memory: 1Gi
          env:
            - name: SINK
              value: postgres
            - name: BH1750_ENABLED
              value: "1"
            - name: HDC302X_ENABLED
              value: "1"
            - name: DS18B20_ENABLED
              value: "1"
            - name: POLL_INTERVAL_SECONDS
              value: "30"
            - name: BUFFER_RETENTION_DAYS
              value: "30"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auto-water-db-app
                  key: uri
          livenessProbe:
            exec:
              command: ["python", "-m", "auto_water.health"]
            initialDelaySeconds: 20
            periodSeconds: 30
