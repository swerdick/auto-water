# CloudNativePG cluster for auto-water's sensor readings.
#
# imageName is intentionally omitted so the cluster uses the operator's default
# operand image (PostgreSQL 18.x on the homelab's CNPG 1.29) — guaranteed
# compatible with the running operator and keeps new clusters on PG18. Immich
# stays on its own pinned PG16 image; one operator serves both.
#
# CNPG generates a `auto-water-db-app` Secret containing a ready-to-use `uri`
# connection string for the `autowater` database — the Deployment reads it.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auto-water-db
  namespace: auto-water
spec:
  instances: 1
  storage:
    size: 5Gi
    storageClass: nfs-scratch
  bootstrap:
    initdb:
      database: autowater
      owner: autowater
  # Expose the read-write endpoint on a stable LAN IP via MetalLB so GUI
  # clients (DataGrip) can connect without a kubectl port-forward. CNPG owns
  # the service (correct primary selector + lifecycle).
  managed:
    services:
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: auto-water-db-lb
              annotations:
                metallb.universe.tf/address-pool: general-pool
                metallb.universe.tf/loadBalancerIPs: "192.168.1.221"
            spec:
              type: LoadBalancer
