# Hand-managed PodMonitor for auto-water's CNPG instance metrics endpoint
# (:9187), replacing the deprecated spec.monitoring.enablePodMonitor flag —
# CNPG is removing operator-managed PodMonitors (deprecated in 1.26). Mirrors
# what the operator generated; `cnpg.io/podRole: instance` is required (its
# omission is the metric-label-loss bug in CNPG issue #8978). Scraped by the
# homelab's kube-prometheus-stack, which feeds the CNPG Grafana dashboard.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: auto-water-db-metrics
  namespace: auto-water
spec:
  namespaceSelector: {}
  selector:
    matchLabels:
      cnpg.io/cluster: auto-water-db
      cnpg.io/podRole: instance
  podMetricsEndpoints:
    - port: metrics
