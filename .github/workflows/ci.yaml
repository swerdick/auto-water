name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/poc
    env:
      CONTAINER_CLI: docker
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: src/poc/requirements-dev.txt

      - uses: extractions/setup-just@v3

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run CI pipeline
        run: just ci
        working-directory: .

  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: python
          source-root: src/poc

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
