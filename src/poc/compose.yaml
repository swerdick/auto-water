# Local dev: brings up Postgres + the poller so the DB write path, schema
# creation, and heartbeat can be smoke-tested without a Pi. No sensors are
# enabled here (there's no hardware in compose) so the poller idles and just
# beats its heartbeat. On the Pi, sensors are enabled via env (BH1750_ENABLED=1,
# DS18B20_ENABLED=1, ...) plus device mounts — see the k8s manifests.
services:
  postgres:
    image: docker.io/library/postgres:16-bookworm
    environment:
      POSTGRES_USER: autowater
      POSTGRES_PASSWORD: autowater
      POSTGRES_DB: autowater
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autowater"]
      interval: 5s
      timeout: 3s
      retries: 5
  app:
    build:
      context: .
      dockerfile: Containerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SINK: postgres
      DATABASE_URL: postgresql://autowater:autowater@postgres:5432/autowater
      POLL_INTERVAL_SECONDS: "10"
